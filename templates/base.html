<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pacing{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<button class="toggle-btn" onclick="toggleSidebar()">☰</button>

<aside class="sidebar">
    <h2>Pacing</h2>
    <div class="profile-section">
        <div class="profile-avatar">
            <img src="/uploads/{{ current_user.profile_photo }}" width="80" style="border-radius: 50%;">
        </div>
        <p>{{ current_user.display_name }}</p>
    </div>

    <nav class="sidebar-menu">
        <a href="{{ url_for('index') }}" class="sidebar-btn" style="text-decoration: none;">Dashboard</a>
        <a href="{{ url_for('completed_books') }}" class="sidebar-btn" style="text-decoration: none;">Completed Books</a>
        <a href="{{ url_for('profile') }}" class="sidebar-btn" style="text-decoration: none;">Profile</a>
        <button class="sidebar-btn">Settings</button>
    </nav>

    <div class="sidebar-footer">
        <a href="{{ url_for('logout') }}" class="sidebar-btn" style="text-decoration: none;">Sign Out</a>
    </div>
</aside>

<main class="main-content">
    {% block content %}{% endblock %}
</main>

<script>
function toggleSidebar(){
    const sidebar = document.querySelector('.sidebar');
    const main = document.querySelector('.main-content');
    const btn = document.querySelector('.toggle-btn');
    sidebar.classList.toggle('hidden');
    main.classList.toggle('expanded');
    btn.classList.toggle('shifted');
}
</script>

</body>
</html>
