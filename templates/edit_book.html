<!DOCTYPE html>
<html lang = "eng">
    <head>
        <meta charset="UTF-8">
        <title> Add a Book </title>
        <link rel = "stylesheet" href="{{url_for('static', filename ='style.css')}} ">


    </head>
    <body>
        <h2 style="text-align: center">Edit Book</h2>
        <div class="edit_book">
        <form action = '/edit/{{book.id}}' method="POST">
            <label for = 'title'>Title *</label>
            <input type = "text" id = "title" name = "title" value = '{{book.title}}' required>

            <label for = "author">Author *</label>
            <input type = "text" id = "author" name = "author" value = '{{book.author}}' required>

            <label for = "current_page">Current Page *</label>
            <input type = "number" id= "current_page" name = 'current_page' value = '{{book.current_page}}'required>

            <label for = 'total_pages'>Total Pages *</label>
            <input type = "number" id ='total_pages' name = 'total_pages' value = '{{book.total_pages}}' required>

            <button type="submit" class="add-book-btn"> Edit Book</button>
            <a href="/">← Back to dashboard</a> 
        </form>
        </div>

    </body>
</html>
