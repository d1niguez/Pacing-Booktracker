{% extends 'base.html' %}
{% block title %}Profile{% endblock %}

{% block content %}
<h1>Profile</h1>
<p>Customize your profile here.</p>
<hr>

<div class="add-book-form">
    <form method="POST" enctype="multipart/form-data">
        <label>Profile Photo:</label>
        <input type="file" name="profile_photo">
        <img src="/uploads/{{ current_user.profile_photo }}" width="150">

        <label>Display Name:</label>
        <input type="text" name="display_name" value="{{ current_user.display_name or '' }}">

        <label>Favorite Genre:</label>
        <input type="text" name="favorite_genre" value="{{ current_user.favorite_genre or '' }}">

        <label>Daily Reading Goal (pages):</label>
        <input type="number" name="daily_goal" value="{{ current_user.daily_goal or 0 }}">

        <label>Yearly Book Goal:</label>
        <input type="number" name="yearly_goal" value="{{ current_user.yearly_goal or 0 }}">

        <button type="submit">Save Changes</button>
    </form>
</div>
{% endblock %}
