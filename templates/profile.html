<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- Interactive Rounded Sidebar Layout -->
<aside class="sidebar"> 
    <h2>Pacing</h2> 
    <div class="profile-section">
        <div class="profile-avatar"> DI </div>
        <p>{{display_name}}</p>
    </div>
    
    <!-- Navigation Links Menu -->
<nav class="sidebar-menu">
        <a href="{{ url_for('index') }}" class="sidebar-btn" style="text-decoration: none;"> Dashboard </a>
        <a href="{{url_for('completed_books')}}"class ='sidebar-btn' style = 'text-decoration:none;'> Completed Books</a>
        <a href = "{{ url_for('profile') }}" class = 'sidebar-btn' style = 'text-decoration:none;'> Profile </a>
        <button class= 'sidebar-btn'> Settings </button>
    </nav>

    <div class="sidebar-footer">
        <button class="signout-button">Sign Out</button>
    </div>

</aside> 

    <main class="main-content">
        <h1> Profile</h1>
        <p> Customize profile here.</p>

        <hr>

        <div class="add-book-form">

<form method="POST">
    <label>Display Name:</label>
    <input type="text" name="display_name" value="{{ user.display_name or '' }}">

    <label>Favorite Genre:</label>
    <input type="text" name="favorite_genre" value="{{ user.favorite_genre or '' }}">

    <label>Daily Reading Goal (pages):</label>
    <input type="number" name="daily_goal" value="{{ user.daily_goal or 0 }}">

    <label>Yearly Book Goal:</label>
    <input type="number" name="yearly_goal" value="{{ user.yearly_goal or 0 }}">

    <button type="submit">Save Changes</button>
</form>

    </body>
    </html>
