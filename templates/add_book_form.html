<!DOCTYPE html>
<html lang = "eng">
    <head>
        <meta charset="UTF-8">
        <title> Add a Book </title>
        <link rel = "stylesheet" href="{{url_for('static', filename ='style.css')}} ">


    </head>
    <body>
        <form action = '/add_book_form' method="POST">
            <label for = 'title'>Title</label>
            <input type = "text" id = "title" name = "title" required>

            <label for = "author">Author</label>
            <input type = "text" id = "author" name = "author" required>

            <label>ISBN</label>
            <input type=" number" id="isbn" name = "ISBN">
            
            <label for = "current_page">Current Page</label>
            <input type = "number" id= "current_page" name = 'current_page' required>

            <label for = 'total_pages'>Total Pages</label>
            <input type = "number" id ='total_pages' name = 'total_pages' required>

            <button type="submit"> Add Book</button> 
        </form>

    </body>
</html>
